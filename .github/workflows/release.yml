name: Release

# Two triggers:
# - Tag push (community-plugin convention: tag equals the manifest version,
#   no "v" prefix), e.g. `git tag 0.9.0 && git push origin 0.9.0`.
# - Manual dispatch: creates the release (and its tag) from the manifest
#   version at the selected ref — useful when tags can't be pushed directly.
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Determine release tag
        id: tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            if [ "$GITHUB_REF_NAME" != "$MANIFEST_VERSION" ]; then
              echo "Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST_VERSION" >&2
              exit 1
            fi
          fi
          echo "tag=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            main.js manifest.json styles.css
